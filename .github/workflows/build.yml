name: Build Threat Feed

on:
  schedule:
    - cron: "0 * * * *"   # hourly (more reliable than */15)
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run build script
      run: python scripts/build_feed.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ip-feed.txt fqdn-feed.txt
        git commit -m "Update feeds" || echo "No changes"
        git push
